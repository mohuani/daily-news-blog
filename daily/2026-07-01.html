<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球每日资讯简报 - 2026年7月1日</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-primary: #FAFBFC;
    --bg-secondary: #FFFFFF;
    --bg-accent: #F0F4F3;
    --bg-highlight: #EBF0EE;
    --text-primary: #1A2B2A;
    --text-secondary: #4A5E5C;
    --text-muted: #7A8E8C;
    --accent-teal: #2D8B7A;
    --accent-teal-light: #3AA895;
    --accent-gold: #C4993B;
    --accent-gold-light: #E8C97A;
    --accent-rose: #C4686B;
    --accent-blue: #4A7FB5;
    --accent-purple: #7B6BAE;
    --accent-orange: #D08B4B;
    --border-light: #E2E8E6;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .header {
    background: linear-gradient(135deg, #1A2B2A 0%, #2D4A47 50%, #3A5E5A 100%);
    padding: 60px 0 50px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(61,168,149,0.15) 0%, transparent 70%);
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,153,59,0.1) 0%, transparent 70%);
  }

  .header-content {
    position: relative;
    z-index: 1;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .brand-tag {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent-gold-light);
    font-weight: 500;
  }

  .date-tag {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }

  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 36px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    font-weight: 300;
    letter-spacing: 1px;
  }

  .divider-line {
    width: 60px;
    height: 2px;
    background: var(--accent-gold);
    margin: 24px 0;
  }

  .summary-section {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 36px 40px;
    margin: -24px auto 0;
    position: relative;
    z-index: 2;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-light);
  }

  .summary-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-teal);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .summary-text {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  .summary-text strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .section {
    margin-top: 40px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-light);
  }

  .section-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 1px;
  }

  .news-card {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 12px;
    border: 1px solid var(--border-light);
    transition: box-shadow 0.2s ease, transform 0.15s ease;
  }

  .news-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .news-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .tag-important { background: #FEF3E2; color: #B8792A; }
  .tag-policy { background: #E8F0FE; color: #3B6FB5; }
  .tag-data { background: #E6F5F2; color: #2D8B7A; }
  .tag-company { background: #F3EEFA; color: #6B5BA8; }
  .tag-breaking { background: #FDE8E8; color: #C44848; }

  .news-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .news-summary {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  .news-summary em {
    font-style: normal;
    color: var(--accent-teal);
    font-weight: 500;
  }

  .data-box {
    background: linear-gradient(135deg, #F0F4F3 0%, #E6EDEB 100%);
    border-radius: 12px;
    padding: 28px 32px;
    margin-top: 16px;
    border-left: 4px solid var(--accent-teal);
  }

  .data-box-title {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-teal);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .data-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .data-item {
    background: var(--bg-secondary);
    border-radius: 8px;
    padding: 16px 20px;
    border: 1px solid var(--border-light);
  }

  .data-value {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-teal);
    margin-bottom: 4px;
  }

  .data-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  .focus-box {
    background: linear-gradient(135deg, #FDF8ED 0%, #FBF2E0 100%);
    border-radius: 12px;
    padding: 28px 32px;
    margin-top: 16px;
    border-left: 4px solid var(--accent-gold);
  }

  .focus
